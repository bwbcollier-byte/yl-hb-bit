name: Instagram Enrichment

on:
  schedule:
    # Run 4 times a day (every 6 hours)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Run Instagram Enrichment
      env:
        AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
        AIRTABLE_VIEW_ID: ${{ secrets.AIRTABLE_VIEW_ID }}
        RAPIDAPI_KEYS: ${{ secrets.RAPIDAPI_KEYS }}
      run: |
        python3 enrich_instagram_airtable.py --all
