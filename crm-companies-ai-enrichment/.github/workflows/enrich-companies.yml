name: Enrich Company Records

on:
  schedule:
    # Run daily at 2 AM UTC (7 PM PST / 8 PM PDT)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual triggers from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run company enrichment
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_SOURCE_VIEW_ID: ${{ secrets.AIRTABLE_SOURCE_VIEW_ID }}
          AIRTABLE_TARGET_VIEW_ID: ${{ secrets.AIRTABLE_TARGET_VIEW_ID }}
          CONFIDENCE_THRESHOLD: 90
          TEST_MODE: false
        run: npm start
