name: Daily Bandsintown Enrichment

on:
  schedule:
    - cron: '0 3 * * *'   # Once daily at 3am UTC (Playwright is slow — no need to run more often)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  enrich_bandsintown:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          playwright install chromium --with-deps

      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"p_workflow_id\": ${{ secrets.WORKFLOW_ID_BANDSINTOWN }}, \"p_status\": \"running\", \"p_run_id\": \"${{ github.run_id }}\"}" || true

      - name: Run Bandsintown enrichment
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPID_API_KEY:        ${{ secrets.RAPID_API_KEY }}
        run: python enrich_bandsintown.py --all

      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": %s, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "%s"}' \
            "${{ secrets.WORKFLOW_ID_BANDSINTOWN }}" "$STATUS" "$DURATION" "${{ github.run_id }}")
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
