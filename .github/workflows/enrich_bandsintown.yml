name: Bandsintown Enrichment

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours (4 times a day)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": 248710953, "p_status": "running", "p_run_id": "${{ github.run_id }}"  }'
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright playwright-stealth

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Run Enrichment Script
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: ${{ secrets.AIRTABLE_TABLE_ID }}
          AIRTABLE_VIEW_ID: ${{ secrets.AIRTABLE_VIEW_ID }}
        run: |
          # Use --limit 500 for safety in Actions, or --all for full run
          python enrich_bandsintown_airtable.py --all
      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": 248710953, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
