name: Enrich NBA Player Profiles

on:
  schedule:
    # Run weekly on Mondays at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rgm-player-profiles-enrichment
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Enrich NBA Player Profiles
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_PLAYERS_TABLE_ID: ${{ secrets.AIRTABLE_PLAYERS_TABLE_ID }}
          AIRTABLE_PLAYERS_VIEW_ID: ${{ secrets.AIRTABLE_PLAYERS_VIEW_ID }}
        run: node dist/index.js
