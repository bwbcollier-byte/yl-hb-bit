name: Spotify Media Enrichment

on:
  schedule:
    - cron: "20 */4 * * *" # Runs exactly 20 minutes after MusicBrainz/AudioDB
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of items to process (leave empty for 1000)"
        required: false
        type: string

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Spotify Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LIMIT: ${{ github.event.inputs.limit || '1000' }}
        run: npm run spotify
